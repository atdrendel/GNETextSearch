name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Test macOS
        run: >
          xcodebuild test
          -project GNETextSearch.xcodeproj
          -scheme GNETextSearch
          -destination 'platform=macOS'
          -derivedDataPath "$RUNNER_TEMP/DerivedData"

      - name: Build iOS
        run: >
          xcodebuild build
          -project GNETextSearch.xcodeproj
          -scheme 'GNETextSearch iOS'
          -destination 'generic/platform=iOS'
          -derivedDataPath "$RUNNER_TEMP/DerivedData"
          CODE_SIGNING_ALLOWED=NO
